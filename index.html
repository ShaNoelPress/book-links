<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Book Extras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ffd700;
        }
        .subtitle {
            text-align: center;
            opacity: 0.8;
            margin-bottom: 40px;
        }
        .book {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .book h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4ecdc4;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section a {
            display: block;
            background: rgba(255,255,255,0.15);
            color: #fff;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.3s;
        }
        .section a:hover {
            background: rgba(255,255,255,0.25);
        }
        .coming-soon {
            opacity: 0.6;
            font-style: italic;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Mystery Book Extras</h1>
        <p class="subtitle">Watch videos and get cool stuff!</p>

        <div class="book">
            <h2>🐶 Butter's Mystery Adventures</h2>
            
            <div class="section">
                <h3>🎮 Game Videos</h3>
                <a href="#" class="coming-soon">Coming Soon</a>
            </div>

            <div class="section">
                <h3>🛍️ Optional Props & Merch</h3>
                <a href="#" class="coming-soon">Coming Soon</a>
            </div>
        </div>

        <div class="book">
            <h2>📚 More Books Coming Soon</h2>
            <p class="coming-soon">Stay tuned for more mystery adventures!</p>
        </div>

        <footer>
            <p>Happy sleuthing! 🕵️‍♀️</p>
        </footer>
    </div>
</body>
</html>
